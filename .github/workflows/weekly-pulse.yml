# Weekly Review Pulse — Scheduled Run
# Runs every Monday at 06:00 IST (00:30 UTC)
#
# Required secrets:
#   GROQ_API_KEY      — LLM API key for summarization
#   GOOGLE_CREDENTIALS — Service account JSON for Google Workspace MCP
#
# Required variables (optional):
#   PULSE_PRODUCT    — Product identifier (default: groww)
#   PULSE_EMAIL_MODE — Email mode: draft | send | skip (default: draft)

name: Weekly Pulse Run

on:
  schedule:
    # Monday 00:30 UTC = Monday 06:00 IST
    - cron: '30 0 * * 1'
  workflow_dispatch:
    inputs:
      iso_week:
        description: 'ISO week to run (e.g., 2026-W23). Leave empty for current week.'
        required: false
        type: string
      product:
        description: 'Product identifier'
        required: false
        default: 'groww'
        type: string
      dry_run:
        description: 'Run without delivery'
        required: false
        default: false
        type: boolean
      email_mode:
        description: 'Email mode: draft | send | skip'
        required: false
        default: 'draft'
        type: choice
        options:
          - draft
          - send
          - skip

jobs:
  pulse-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./mcp-servers/play-store-reviews
          pip install -e ./pulse-agent

      - name: Determine ISO week
        id: week
        run: |
          if [ -n "${{ inputs.iso_week }}" ]; then
            echo "iso_week=${{ inputs.iso_week }}" >> $GITHUB_OUTPUT
          else
            echo "iso_week=$(date +'%G-W%V')" >> $GITHUB_OUTPUT
          fi

      - name: Run Pulse pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          PULSE_PRODUCT: ${{ inputs.product || 'groww' }}
          PULSE_EMAIL_MODE: ${{ inputs.email_mode || 'draft' }}
        run: |
          PRODUCT="${PULSE_PRODUCT}"
          WEEK="${{ steps.week.outputs.iso_week }}"
          EMAIL_MODE="${PULSE_EMAIL_MODE}"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Running dry-run for ${PRODUCT} ${WEEK}..."
            pulse dry-run --product "${PRODUCT}" --iso-week "${WEEK}"
          else
            echo "Running pipeline for ${PRODUCT} ${WEEK} (email_mode=${EMAIL_MODE})..."
            pulse run --product "${PRODUCT}" --iso-week "${WEEK}" --email-mode "${EMAIL_MODE}"
          fi

      - name: Upload run ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-ledger-${{ steps.week.outputs.iso_week }}
          path: data/runs/
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Pulse pipeline failed for week ${{ steps.week.outputs.iso_week }}"
          echo "Check the run ledger artifact for details."
